services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: clinidesk-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - clinidesk-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: clinidesk-backend
    env_file:
      - ./backend/.env
    networks:
      - clinidesk-network
    restart: unless-stopped

networks:
  clinidesk-network: