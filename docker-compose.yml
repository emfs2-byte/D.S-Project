version: '3.8'

services:
  # Proxy Reverso (Nginx) - Porta 80
  nginx:
    image: nginx:alpine
    container_name: clinidesk-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  # Backend (Node.js) - Puxa o banco da nuvem via .env
  backend:
    build: 
      context: ./backend
    container_name: clinidesk-backend
    env_file:
      - ./backend/.env 
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./Front
    container_name: clinidesk-frontend
    environment:
      - VITE_API_URL=/NPI/api 
    depends_on:
      - backend
    volumes:
      - ./Front:/usr/src/app
      - /usr/src/app/node_modules